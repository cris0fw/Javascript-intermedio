<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <h1 class="mb-4">Color Picker</h1>

                <div class="mb-3">
                    <label for="colorInput" class="form-label">Choose a color:</label>
                    <input type="color" class="form-control form-control-color" id="colorInput" value="#563d7c">
                </div>

                <button id="changeColorBtn" class="btn btn-primary mt-3 w-100 p-2">Change Color</button>

                <p class="lead mt-3 colorParrafo">#563d7c</p>

                <div class="card p-5" style="background-color: #563d7c;"></div>
            </div>
        </div>
    </div>
    
    <script src="../javascript/color.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
